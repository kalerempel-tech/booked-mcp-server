[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "mcp-server"

[services.env]
MODAL_API_URL = "https://kalerempel--booked-demo-analysis-fastapi-app.modal.run"
